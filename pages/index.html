<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>OFS Mods - Ore Factory Squad Mod Portal</title><meta name="description" content="Discover verified community mods for Ore Factory Squad."><link rel="icon" href="./brand.png"><meta property="og:image" content="https://ofs-modding.github.io/ofs-mod-portal/og.png">
<style>
:root{--i:#11110f;--p:#f3efe5;--y:#f2b705;--r:#b8552d;--l:#c9c1b0}*{box-sizing:border-box}html{scroll-behavior:smooth}body{margin:0;background:var(--p);color:var(--i);font-family:Arial,sans-serif}a{color:inherit;text-decoration:none}nav{height:74px;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(22px,6vw,90px);border-bottom:1px solid var(--l)}.brand{font-weight:900;letter-spacing:.1em}.brand b{background:var(--y);padding:8px;margin-right:8px}.links{display:flex;gap:24px;font-size:12px;font-weight:800;text-transform:uppercase}.hero{min-height:530px;padding:80px clamp(24px,8vw,140px);background:linear-gradient(110deg,#11110ff5,#11110fd9),repeating-linear-gradient(135deg,#171713 0,#171713 18px,#22221c 18px,#22221c 36px);color:white}.eyebrow{color:var(--y);font-size:12px;font-weight:900;letter-spacing:.2em;text-transform:uppercase}.hero h1{max-width:900px;margin:20px 0;font-size:clamp(54px,9vw,120px);line-height:.86;letter-spacing:-.065em;text-transform:uppercase}.hero h1 em{color:var(--y);font-style:normal}.hero>p:last-of-type{max-width:610px;color:#cbc7bc;font-size:18px;line-height:1.6}.button{display:inline-block;margin-top:20px;padding:14px 20px;background:var(--y);font-size:13px;font-weight:900;text-transform:uppercase}.browse{padding:80px clamp(24px,6vw,90px)}.top{display:flex;justify-content:space-between;align-items:end;gap:25px}.top h2{margin:0;font-size:clamp(38px,6vw,70px);text-transform:uppercase;letter-spacing:-.05em}input{width:min(360px,70vw);padding:15px;border:1px solid var(--l);background:#fffdf7;font:inherit}.grid{display:grid;grid-template-columns:repeat(2,1fr);gap:20px;margin-top:42px}.card{min-height:290px;padding:28px;background:#fffdf7;border:1px solid var(--l);box-shadow:5px 5px 0 #ddd4c1;display:flex;flex-direction:column}.card img{width:64px;height:64px;object-fit:cover;margin-bottom:16px;border:1px solid var(--l)}.card h3{margin:0;font-size:23px;text-transform:uppercase}.meta{color:var(--r);font:700 12px monospace}.card p{color:#514d45;line-height:1.6}.tags{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 22px}.tags span{padding:6px 8px;background:#ece6d9;font:700 10px monospace;text-transform:uppercase}.actions{display:flex;gap:10px;margin-top:auto}.actions a{padding:11px 13px;border:1px solid var(--i);font-size:12px;font-weight:900;text-transform:uppercase}.actions a:first-child{background:var(--y);border-color:var(--y)}footer{display:flex;justify-content:space-between;padding:32px clamp(24px,6vw,90px);background:var(--i);color:#aaa69b;font-size:13px}footer a{color:var(--y);font-weight:800}@media(max-width:700px){.links a:not(:last-child){display:none}.top{align-items:stretch;flex-direction:column}.grid{grid-template-columns:1fr}.hero{padding-top:65px}.actions{flex-direction:column;text-align:center}footer{gap:18px;flex-direction:column}}
</style></head><body>
<nav><a class="brand" href="#"><b>OFS</b> MODS</a><div class="links"><a href="https://github.com/OFS-Modding/ofs-loader/releases/latest/download/OFS-Installer-win-x64.exe">Download</a><a href="https://github.com/OFS-Modding/ofs-sdk">SDK</a><a href="https://github.com/OFS-Modding/ofs-mod-catalog">Catalog</a><a href="https://github.com/OFS-Modding">GitHub</a></div></nav>
<section class="hero"><p class="eyebrow">Community-built / Package-verified</p><h1>Build the factory<br><em>your way.</em></h1><p>Run one installer, then discover and verify mods directly from the in-game Mod Hub.</p><a class="button" href="https://github.com/OFS-Modding/ofs-loader/releases/latest/download/OFS-Installer-win-x64.exe">Download installer</a></section>
<section class="browse" id="mods"><div class="top"><div><p class="eyebrow">Catalog</p><h2>Available now</h2></div><input id="search" type="search" placeholder="Search mods…" aria-label="Search mods"></div><div class="grid" id="grid"></div></section>
<footer><span>OFS-Modding is a community project.</span><a href="https://github.com/OFS-Modding/ofs-mod-catalog/issues/new?template=mod-submission.yml">Submit a mod -&gt;</a></footer>
<script>
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));let mods=[];const grid=document.querySelector('#grid');function draw(q=''){const n=q.toLowerCase();grid.innerHTML=mods.filter(m=>[m.name,m.id,m.author,m.summary,...m.capabilities].join(' ').toLowerCase().includes(n)).map(m=>{const repo=m.package.url.split('/releases/')[0];return `<article class="card"><img src="${esc(m.thumbnail.url)}" width="64" height="64" alt=""><span class="meta">${esc(m.id)} / v${esc(m.version)}</span><h3>${esc(m.name)}</h3><p>${esc(m.summary)}</p><div class="tags"><span>${m.multiplayer==='incompatible'?'Single-player':'Multiplayer ready'}</span><span>SDK ${esc(m.sdkVersion)}</span><span>${Math.ceil(m.package.bytes/1024)} KB</span></div><div class="actions"><a href="${esc(m.package.url)}">Download .ofmod</a><a href="${esc(repo)}">Source</a></div></article>`}).join('')||'<p>No matching mods.</p>'}fetch('https://ofs-modding.github.io/ofs-mod-catalog/catalog.json').then(r=>{if(!r.ok)throw new Error(`HTTP ${r.status}`);return r.json()}).then(c=>{mods=c.mods;draw()}).catch(()=>grid.textContent='Catalog unavailable.');document.querySelector('#search').addEventListener('input',e=>draw(e.target.value));
</script></body></html>
